backend:
  name: git-gateway
  branch: main

media_folder: "uploads"
public_folder: "/uploads"

collections:
  - name: "news"
    label: "Nyheder"
    folder: "content/news"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titel", name: "title", widget: "string" }
      - { label: "Dato", name: "date", widget: "datetime" }
      - { label: "Uddrag", name: "excerpt", widget: "text" }
      - { label: "Indhold", name: "body", widget: "markdown" }
      - { label: "PDF (valgfri)", name: "pdf", widget: "file", required: false }

  - name: "menus"
    label: "Menu PDF'er"
    folder: "uploads"
    create: false
    fields:
      - { label: "Fil", name: "file", widget: "file" }

  - name: "gallery"
    label: "Galleri billeder"
    folder: "uploads/gallery"
    create: false
    fields:
      - { label: "Billede", name: "image", widget: "image" }
