backend:
  name: git-gateway
  branch: main

media_folder: "uploads"
public_folder: "/uploads"

collections:
  - name: "news"
    label: "Nyheder"
    files:
      - label: "Nyhedsoversigt"
        name: "news_index"
        file: "content/news.json"
        fields:
          - label: "Nyheder"
            name: "posts"
            widget: "list"
            summary: "{{fields.date}} — {{fields.title}}"
            hint: "Tilføj/redigér nyheder her, så vises de på hjemmesiden"
            fields:
              - { label: "ID", name: "id", widget: "string", required: true, hint: "Unik slug (skal være unik)", pattern: ["^[a-z0-9]+(?:-[a-z0-9]+)*$", "Brug små bogstaver, tal og bindestreger"] }
              - { label: "Titel", name: "title", widget: "string", required: true }
              - { label: "Dato", name: "date", widget: "datetime", required: true, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
              - { label: "Uddrag", name: "excerpt", widget: "text", required: true }
              - { label: "Brødtekst", name: "body", widget: "markdown", required: true }
              - label: "Billeder"
                name: "images"
                widget: "list"
                required: false
                field: { label: "Billede", name: "image", widget: "image", media_folder: "uploads/gallery", public_folder: "/uploads/gallery" }
              - { label: "PDF", name: "pdf", widget: "file", required: false }

  - name: "menu_pdf_stier"
    label: "Menu PDF-stier"
    media_folder: "uploads"
    public_folder: "/uploads"
    files:
      - label: "Menuer og arrangementer"
        name: "menu_paths"
        file: "content/menus.json"
        fields:
          - { label: "Aftenmenu", name: "aftenmenu", widget: "file" }
          - { label: "Frokostmenu", name: "frokostmenu", widget: "file" }
          - { label: "Barnedåb", name: "barnedaab", widget: "file" }
          - { label: "Bisættelse", name: "bisaettelse", widget: "file" }
          - { label: "Firmaarrangement", name: "firma", widget: "file" }
          - { label: "Fødselsdag", name: "foedselsdag", widget: "file" }
          - { label: "Generalforsamling", name: "generalforsamling", widget: "file" }
          - { label: "Jubilæum", name: "jubilaeum", widget: "file" }
          - { label: "Konfirmation", name: "konfirmation", widget: "file" }
          - { label: "Mindesammenkomst", name: "mindesammenkomst", widget: "file" }

  - name: "event_pdf"
    label: "Valentins PDF"
    files:
      - label: "Valentinsmenu"
        name: "valentinsmenu"
        file: "uploads/vlt-menu.pdf"
        fields:
          - { label: "PDF", name: "file", widget: "file", hint: "Upload event/Valentins PDF" }

  - name: "galleri"
    label: "Galleri"
    media_folder: "uploads/gallery"
    public_folder: "/uploads/gallery"
    files:
      - label: "Galleri-billeder"
        name: "gallery"
        file: "content/gallery.json"
        hint: "Upload galleribilleder her. Brug uploads/gallery som mappe for nye filer."
        fields:
          - label: "Billeder"
            name: "images"
            widget: "list"
            fields:
              - { label: "Billede", name: "src", widget: "image" }
              - { label: "Alt tekst", name: "alt", widget: "string", required: false }

  - name: "forside_slideshow"
    label: "Forside-slideshow"
    media_folder: "uploads/gallery"
    public_folder: "/uploads/gallery"
    files:
      - label: "Smagsglimt fra køkkenet"
        name: "home_slideshow"
        file: "content/home-slideshow.json"
        hint: "Disse billeder vises kun på forsiden under 'Smagsglimt fra køkkenet'."
        fields:
          - label: "Slideshow billeder"
            name: "images"
            widget: "list"
            fields:
              - { label: "Billede", name: "src", widget: "image" }
              - { label: "Alt tekst", name: "alt", widget: "string", required: false }
