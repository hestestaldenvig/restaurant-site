              </button>
            </li>
            <li>
              <button type="button" class="gallery-item" data-lightbox-src="uploads/gallery/mad-3.jpg" data-lightbox-alt="Anrettet ret fra Hestestalden i varme nuancer">

            <li>

              </button>
            </li>
            <li>
              <button type="button" class="gallery-item" data-lightbox-src="uploads/gallery/mad-6.jpg" data-lightbox-alt="Klassisk madoplevelse fra Hestestalden">
                <img src="uploads/gallery/mad-6.jpg" alt="Klassisk madoplevelse fra Hestestalden" loading="lazy" />
              </button>
            </li>
          </ul>
        </div>
      </section>

    </div>

    <div class="lightbox" id="gallery-lightbox" hidden>

      <figure class="lightbox-content" role="dialog" aria-modal="true" aria-label="Visning af galleri-billede">
